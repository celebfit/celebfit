# celebfit HTML 미리보기 → GitHub Pages (팀·핸드폰에서 HTTPS 접속)

name: Deploy app preview (GitHub Pages)

on:
  push:
    branches: [app]
    paths:
      - 'celebfit_app/preview/**'
      - 'celebfit_app/assets/**'
      - '.github/workflows/app-web-preview.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: celebfit_app

      - id: deployment
        uses: actions/deploy-pages@v4

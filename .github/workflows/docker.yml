name: Build and push celebfit API image

on:
  push:
    branches: [app]
    paths:
      - 'Dockerfile'
      - 'api/**'
      - 'deploy/**'
      - 'pipeline/**'
      - 'masking_bisenet/**'
      - 'util/**'
      - 'lora_checkpoint/**'
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/celebfit-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/celebfit-api:${{ github.sha }}
